name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          # The admission verifier validates that the evidence commit is an
          # ancestor of this checkout; the default shallow clone cannot prove
          # that relationship for a prior verified artifact.
          fetch-depth: 0

      - name: Install shell tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg shellcheck shfmt

      - name: Validate Bash syntax
        run: make syntax

      - name: Run ShellCheck
        run: make lint

      - name: Check formatting
        run: make format-check

      - name: Run tests
        env:
          LSI_REQUIRE_REAL_GPG: '1'
        run: make test

  container-smoke:
    name: Container smoke (${{ matrix.name }})
    needs: lint-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu 24.04
            image: ubuntu:24.04
          - name: Ubuntu 26.04
            image: ubuntu:26.04
          - name: Debian 12
            image: debian:12
          - name: Rocky Linux 9.8
            image: rockylinux/rockylinux:9.8@sha256:8101994123cf3d0a8fee517bee7f39e555c7d92bd2d9eb3303cc988a0eeed00f
          - name: AlmaLinux 9.8
            image: almalinux:9.8@sha256:d2515c769e7b73f95c4fde38c0a505336ff38f14990c0b7253b77060a049a743
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Prepare credential-free source export
        run: |
          mkdir -p "$RUNNER_TEMP/source"
          git archive --format=tar --output="$RUNNER_TEMP/source.tar" "$GITHUB_SHA"
          tar -xf "$RUNNER_TEMP/source.tar" -C "$RUNNER_TEMP/source"
          test ! -e "$RUNNER_TEMP/source/.git"

      - name: Run read-only smoke test
        run: |
          docker run --rm --read-only --tmpfs /tmp \
            -v "${RUNNER_TEMP}/source:/workspace:ro" \
            "${{ matrix.image }}" \
            bash /workspace/tests/container-smoke.sh

  repository-resolution:
    name: Repository resolution (${{ matrix.name }})
    needs: lint-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu 24.04
            image: ubuntu:24.04
          - name: Ubuntu 26.04
            image: ubuntu:26.04
          - name: Debian 12
            image: debian:12
          - name: Rocky Linux 9.8
            image: rockylinux/rockylinux:9.8@sha256:8101994123cf3d0a8fee517bee7f39e555c7d92bd2d9eb3303cc988a0eeed00f
          - name: AlmaLinux 9.8
            image: almalinux:9.8@sha256:d2515c769e7b73f95c4fde38c0a505336ff38f14990c0b7253b77060a049a743
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Prepare credential-free source export
        run: |
          mkdir -p "$RUNNER_TEMP/source"
          git archive --format=tar --output="$RUNNER_TEMP/source.tar" "$GITHUB_SHA"
          tar -xf "$RUNNER_TEMP/source.tar" -C "$RUNNER_TEMP/source"
          test ! -e "$RUNNER_TEMP/source/.git"

      - name: Resolve every declared package
        run: |
          docker run --rm \
            -v "${RUNNER_TEMP}/source:/workspace:ro" \
            "${{ matrix.image }}" \
            bash /workspace/tests/repository-smoke.sh
